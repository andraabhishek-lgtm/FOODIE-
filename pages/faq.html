<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ - FoodieExpress</title>

  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/dark-theme.css" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layouts.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
</head>
<body>

  <div id="header"></div>

  <div class="page-header fade-up">
    <div class="container page-header-content">
      <h1 class="page-title">❓ Frequently Asked Questions</h1>
      <div class="breadcrumb">
        <a href="../index.html">Home</a>
        <span class="sep">›</span>
        <span class="current">FAQ</span>
      </div>
    </div>
  </div>

  <section class="section fade-up">
    <div class="container">
      <div style="max-width:820px;margin:0 auto">

        <!-- FAQ Search -->
        <div style="position:relative;margin-bottom:40px">
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px">🔍</span>
          <input type="text" id="faqSearch" class="form-control" placeholder="Search your question..." style="padding-left:44px;padding-right:16px;font-size:16px;height:52px;border-radius:var(--radius-full)" />
        </div>

        <!-- FAQ Categories -->
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px" id="faqCats">
          <span class="filter-chip active" data-faq-cat="all">All</span>
          <span class="filter-chip" data-faq-cat="ordering">🛒 Ordering</span>
          <span class="filter-chip" data-faq-cat="delivery">🚚 Delivery</span>
          <span class="filter-chip" data-faq-cat="payment">💳 Payment</span>
          <span class="filter-chip" data-faq-cat="account">👤 Account</span>
          <span class="filter-chip" data-faq-cat="refund">🔄 Refunds</span>
        </div>

        <div id="faqList"></div>

        <!-- Still have questions? -->
        <div style="text-align:center;margin-top:56px;padding:40px;background:var(--bg-secondary);border-radius:var(--radius-xl)">
          <div style="font-size:48px;margin-bottom:14px">💬</div>
          <h3 style="font-size:22px;font-weight:700;margin-bottom:8px">Still Have Questions?</h3>
          <p style="color:var(--text-secondary);margin-bottom:24px">Our support team is available 24/7 to help you with anything.</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <a href="contact.html" class="btn btn-primary">📧 Email Us</a>
            <a href="#" class="btn btn-secondary" onclick="Toast.info('Live Chat', 'Opening chat support...');return false">💬 Live Chat</a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/app.js?v=16"></script>
  <script>
    const FAQS = [
      { cat: 'ordering', q: 'How do I place an order?', a: 'Browse restaurants on our app or website, select your items, add them to your cart, fill in your delivery address, choose a payment method and place your order. You\'ll receive a confirmation instantly.' },
      { cat: 'ordering', q: 'Can I schedule an order for later?', a: 'Yes! You can schedule your order up to 2 days in advance. During checkout, select "Schedule Delivery" and pick your preferred time slot.' },
      { cat: 'ordering', q: 'Can I modify or cancel my order?', a: 'You can cancel or modify your order within 2 minutes of placing it. After that, the restaurant starts preparing your food and cancellations may not be possible.' },
      { cat: 'ordering', q: 'Is there a minimum order amount?', a: 'Minimum order amounts vary by restaurant, typically between ₹99 and ₹249. You can see the minimum order amount on each restaurant\'s page before ordering.' },
      { cat: 'delivery', q: 'How long does delivery take?', a: 'Delivery typically takes 25-45 minutes depending on your location and the restaurant\'s preparation time. Our average delivery time is 32 minutes!' },
      { cat: 'delivery', q: 'Do you deliver to my area?', a: 'We currently operate in 25+ cities across India. Enter your delivery address to check if we deliver to your specific location.' },
      { cat: 'delivery', q: 'What is the delivery fee?', a: 'Delivery fees start from ₹15 and vary by distance and restaurant. Orders above ₹500 typically qualify for free delivery. Check each restaurant for specific fees.' },
      { cat: 'delivery', q: 'What happens if my order is late?', a: 'If your order is significantly delayed, contact our support team. We\'ll investigate and may offer you credits or a refund as compensation.' },
      { cat: 'payment', q: 'What payment methods do you accept?', a: 'We accept Credit/Debit Cards (Visa, Mastercard, RuPay), UPI (Google Pay, PhonePe, Paytm), Net Banking, and Cash on Delivery.' },
      { cat: 'payment', q: 'Is it safe to pay online?', a: 'Absolutely! All our payments are secured with 256-bit SSL encryption. We never store your card details. Your payment information is completely safe with us.' },
      { cat: 'payment', q: 'Can I use multiple payment methods?', a: 'Currently, you can use one payment method per order. However, you can use your FoodieExpress wallet balance along with another payment method.' },
      { cat: 'payment', q: 'How do coupon codes work?', a: 'Enter your coupon code in the "Apply Coupon" field at checkout. The discount will be applied automatically. Each coupon has specific terms and validity.' },
      { cat: 'account', q: 'How do I create an account?', a: 'Click on "Sign Up" on the homepage, fill in your name, email, phone number and create a password. That\'s it! You can also sign up using Google or Facebook.' },
      { cat: 'account', q: 'I forgot my password. What should I do?', a: 'Click "Forgot Password" on the login page and enter your registered email. We\'ll send you a password reset link immediately.' },
      { cat: 'account', q: 'How do I update my profile information?', a: 'Go to "My Profile" from the menu. Click "Edit Profile" to update your name, email, phone number or profile picture.' },
      { cat: 'refund', q: 'What is your refund policy?', a: 'If you receive a wrong or missing item, we\'ll process a full refund or replacement within 24 hours. Refunds are credited to your original payment method within 5-7 business days.' },
      { cat: 'refund', q: 'How long does a refund take?', a: 'Refunds are processed within 24 hours of approval. The amount will reflect in your account within 5-7 business days depending on your bank.' },
      { cat: 'refund', q: 'What if the food quality is not good?', a: 'We\'re sorry to hear that! Contact our support team with a photo and description. We\'ll review your case and may offer a refund or FoodieExpress credits.' },
    ];

    let currentCat = 'all';
    let searchQuery = '';

    document.addEventListener('DOMContentLoaded', () => {
      renderFaqs();

      document.querySelectorAll('[data-faq-cat]').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('[data-faq-cat]').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentCat = chip.dataset.faqCat;
          renderFaqs();
        });
      });

      const searchEl = document.getElementById('faqSearch');
      if (searchEl) {
        searchEl.addEventListener('input', debounce(() => {
          searchQuery = searchEl.value.toLowerCase().trim();
          renderFaqs();
        }, 200));
      }
    });

    function renderFaqs() {
      const el = document.getElementById('faqList');
      let filtered = FAQS;

      if (currentCat !== 'all') filtered = filtered.filter(f => f.cat === currentCat);
      if (searchQuery) filtered = filtered.filter(f =>
        f.q.toLowerCase().includes(searchQuery) || f.a.toLowerCase().includes(searchQuery)
      );

      if (filtered.length === 0) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3>No results found</h3>
            <p>Try a different search term or category</p>
          </div>`;
        return;
      }

      el.innerHTML = filtered.map((faq, i) => `
        <div class="accordion-item animate-on-scroll">
          <div class="accordion-header" onclick="toggleFaq(this)" id="faq-${i}">
            <h3>${faq.q}</h3>
            <span class="accordion-icon">+</span>
          </div>
          <div class="accordion-body">
            <p>${faq.a}</p>
          </div>
        </div>
      `).join('');
    }

    function toggleFaq(header) {
      const body = header.nextElementSibling;
      const isOpen = body.classList.contains('open');

      // Close all
      document.querySelectorAll('.accordion-body.open').forEach(b => {
        b.classList.remove('open');
        b.previousElementSibling.classList.remove('open');
      });

      if (!isOpen) {
        body.classList.add('open');
        header.classList.add('open');
      }
    }
  </script>
</body>
</html>
