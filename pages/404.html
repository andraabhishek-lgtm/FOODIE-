<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found - FoodieExpress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/dark-theme.css" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layouts.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0505 50%, #0d0d1a 100%);
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    /* Ambient glow blobs */
    .error-page::before {
      content: '';
      position: absolute;
      top: -120px; left: -80px;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(226,55,68,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .error-page::after {
      content: '';
      position: absolute;
      bottom: -100px; right: -60px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(252,128,25,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .error-card {
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      padding: 56px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0,0,0,0.40),
                  inset 0 1px 0 rgba(255,255,255,0.10);
      position: relative;
      z-index: 1;
    }
    .error-emoji {
      font-size: 72px;
      display: block;
      margin-bottom: 4px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .error-code {
      font-size: clamp(80px, 18vw, 120px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(125deg, #96680a 0%, #ffd700 40%, #ffe97a 55%, #ffd700 70%, #96680a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 8px 0 16px;
      letter-spacing: -4px;
    }
    .error-page h2 {
      font-size: clamp(20px, 4vw, 26px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }
    .error-page p {
      font-size: 15px;
      color: rgba(255,255,255,0.58);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 28px;
    }
    .error-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      margin-bottom: 28px;
    }
    .error-btns .btn {
      min-width: 220px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 999px;
    }
    .error-btns .btn-primary {
      background: #e03131;
      color: #fff;
      border: none;
      box-shadow: 0 6px 24px rgba(224,49,49,0.38);
    }
    .error-btns .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .error-btns .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.50);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 14px;
    }
    .error-chips-wrap {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .error-chips-label {
      font-size: 13px;
      color: rgba(255,255,255,0.42);
      margin-bottom: 12px;
    }
    .error-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-chips a {
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.06);
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .error-chips a:hover {
      background: rgba(226,55,68,0.18);
      border-color: rgba(226,55,68,0.35);
      color: #fff;
    }
    .error-support {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
    }
    .error-support a {
      color: #e03131;
      font-weight: 600;
      text-decoration: none;
    }
    .error-support a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .error-card { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <div class="error-page">
    <div class="error-card">
      <div class="error-emoji">🍕</div>
      <div class="error-code">404</div>
      <h2>Oops! Page Not Found</h2>
      <p>Looks like this page went out for delivery and never came back. Let's get you back on track.</p>

      <div class="error-btns">
        <a href="../index.html" class="btn btn-primary">🏠 Go to Home</a>
        <a href="restaurants.html" class="btn btn-secondary">🍽️ Browse Restaurants</a>
        <button onclick="window.history.back()" class="btn btn-ghost">← Go Back</button>
      </div>

      <div class="error-chips-wrap">
        <p class="error-chips-label">Or search for something specific:</p>
        <div class="error-chips">
          <a href="restaurants.html">🍕 Pizza</a>
          <a href="restaurants.html?cat=burger">🍔 Burger</a>
          <a href="restaurants.html?cat=biryani">🍛 Biryani</a>
          <a href="restaurants.html?cat=chinese">🥡 Chinese</a>
          <a href="restaurants.html?cat=desserts">🍰 Desserts</a>
        </div>
      </div>

      <p class="error-support">Need help? <a href="contact.html">Contact Support</a></p>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/app.js?v=12"></script>
</body>
</html>
