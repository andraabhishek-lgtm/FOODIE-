<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found - FoodieExpress</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/dark-theme.css" />
</head>
<body>

  <div id="header"></div>

  <div style="padding-top:var(--nav-height)" class="error-page">
    <div style="max-width:540px;width:100%;text-align:center">
      <div class="error-emoji">🍕</div>
      <div class="error-code">404</div>
      <h2>Oops! Page Not Found</h2>
      <p>Looks like this page went out for delivery and never came back! Let's get you back on track.</p>

      <div style="display:flex;flex-direction:column;gap:10px;align-items:center;margin-top:24px">
        <a href="../index.html" class="btn btn-primary btn-lg">🏠 Go to Home</a>
        <a href="restaurants.html" class="btn btn-secondary">🍽️ Browse Restaurants</a>
        <button onclick="window.history.back()" class="btn btn-ghost">← Go Back</button>
      </div>

      <div style="margin-top:36px;padding:20px;background:var(--bg-secondary);border-radius:var(--radius-md)">
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:12px">Looking for something specific?</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
          <a href="restaurants.html" class="filter-chip">🍕 Pizza</a>
          <a href="restaurants.html?cat=burger" class="filter-chip">🍔 Burger</a>
          <a href="restaurants.html?cat=biryani" class="filter-chip">🍛 Biryani</a>
          <a href="restaurants.html?cat=desserts" class="filter-chip">🍰 Desserts</a>
        </div>
      </div>

      <div style="margin-top:28px;font-size:14px;color:var(--text-muted)">
        Need help? <a href="contact.html" style="color:var(--primary);font-weight:600">Contact Support</a>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
