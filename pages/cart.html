<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cart - FoodieExpress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/dark-theme.css" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layouts.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
</head>
<body>

  <div id="header"></div>

  <div class="page-header fade-up">
    <div class="container page-header-content">
      <h1 class="page-title">🛒 My Cart</h1>
      <div class="breadcrumb">
        <a href="../index.html">Home</a>
        <span class="sep">›</span>
        <span class="current">Cart</span>
      </div>
    </div>
  </div>

  <div class="container cart-page-grid">
    <!-- Cart Items -->
    <div class="cart-page-items">
      <div class="cart-page-header">
        <h2>Cart Items</h2>
        <button onclick="confirmClearCart()" class="btn btn-ghost btn-sm" style="color:var(--error)">🗑️ Clear All</button>
      </div>
      <div id="cartItemsList"></div>
    </div>

    <!-- Order Summary -->
    <div class="order-summary-card" id="orderSummaryCard">
      <div class="order-summary-header">
        <h3>Order Summary</h3>
      </div>
      <div class="order-summary-body" id="cartSummaryBody"></div>
    </div>
  </div>

  <!-- Recommended Section -->
  <section style="padding:40px 0 80px;background:var(--bg-primary)" id="recommendedSection">
    <div class="container">
      <h2 style="font-size:22px;font-weight:700;margin-bottom:24px">🔥 You Might Also Like</h2>
      <div class="dishes-grid" id="recommendedGrid"></div>
    </div>
  </section>

  <div id="footer"></div>

  <!-- Confirm clear modal -->
  <div class="modal-overlay" id="clearModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>Clear Cart?</h3>
        <button class="cart-close" onclick="document.getElementById('clearModal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to remove all items from your cart?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.getElementById('clearModal').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" style="background:var(--error)" onclick="Cart.clear(); Cart.renderCartPage(); document.getElementById('clearModal').classList.remove('open'); Toast.info('Cart Cleared')">Clear Cart</button>
      </div>
    </div>
  </div>

  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/app.js?v=20"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Cart.renderCartPage();

      // Recommended dishes
      const grid = document.getElementById('recommendedGrid');
      if (grid) {
        const popular = MENU_ITEMS.filter(m => m.popular).slice(0, 4);
        grid.innerHTML = popular.map(item => buildDishCard(item)).join('');
      }
    });

    function confirmClearCart() {
      if (Cart.isEmpty()) return;
      document.getElementById('clearModal').classList.add('open');
    }
  </script>
</body>
</html>
