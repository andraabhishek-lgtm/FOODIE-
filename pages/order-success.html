<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Placed! - FoodieExpress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/dark-theme.css" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layouts.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
</head>
<body style="background:var(--bg-secondary)">

  <div id="header"></div>

  <div style="padding-top:var(--nav-height)" class="success-page">
    <div class="success-card">
      <div class="success-animation">✅</div>

      <h1>Order Placed Successfully!</h1>
      <p id="successSubtitle">Your delicious food is being prepared and will be delivered to your doorstep soon!</p>

      <div class="order-id-box">
        <div>
          <div class="label">Order ID</div>
          <div class="id" id="successOrderId">Loading...</div>
        </div>
        <div style="text-align:right">
          <div class="label">Estimated Delivery</div>
          <div style="font-size:15px;font-weight:700;color:var(--success)" id="successETA">~35 min</div>
        </div>
      </div>

      <!-- Order tracking -->
      <div class="order-tracking">
        <div class="track-step active">
          <div class="track-icon">✅</div>
          <span>Confirmed</span>
        </div>
        <div class="track-step" id="trackStep2">
          <div class="track-icon">👨‍🍳</div>
          <span>Preparing</span>
        </div>
        <div class="track-step">
          <div class="track-icon">🏍️</div>
          <span>On the Way</span>
        </div>
        <div class="track-step">
          <div class="track-icon">🏠</div>
          <span>Delivered</span>
        </div>
      </div>

      <!-- Order summary -->
      <div id="successOrderSummary" style="background:var(--bg-secondary);border-radius:var(--radius-sm);padding:16px;margin-bottom:28px;text-align:left"></div>

      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <a href="orders.html" class="btn btn-secondary">📦 Track Order</a>
        <a href="../index.html" class="btn btn-primary">🏠 Back to Home</a>
      </div>

      <div style="margin-top:20px;font-size:14px;color:var(--text-muted)">
        Need help? <a href="contact.html" style="color:var(--primary)">Contact Support</a>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const order = JSON.parse(localStorage.getItem('fe-last-order') || 'null');

      if (order) {
        document.getElementById('successOrderId').textContent = order.id;

        const eta = order.estimatedDelivery
          ? new Date(order.estimatedDelivery).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
          : '~35 min';
        document.getElementById('successETA').textContent = `By ${eta}`;

        const summaryEl = document.getElementById('successOrderSummary');
        if (summaryEl && order.items) {
          summaryEl.innerHTML = `
            <div style="font-size:14px;font-weight:600;margin-bottom:10px">Order Details</div>
            ${order.items.map(i => `
              <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-secondary);padding:4px 0">
                <span>${i.name} × ${i.qty}</span>
                <span>${formatCurrency(i.price * i.qty)}</span>
              </div>
            `).join('')}
            <div style="border-top:1px dashed var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-weight:700;font-size:15px">
              <span>Total</span><span style="color:var(--primary)">${formatCurrency(order.total)}</span>
            </div>
          `;
        }
      }

      // Animate tracking steps
      setTimeout(() => {
        document.getElementById('trackStep2')?.classList.add('active');
      }, 2000);

      // Confetti effect (CSS-based)
      createConfetti();
    });

    function createConfetti() {
      const colors = ['#FF6B35', '#FDCB6E', '#00B894', '#74B9FF', '#A29BFE'];
      for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
          position:fixed;
          top:-10px;
          left:${Math.random() * 100}vw;
          width:${Math.random() * 8 + 6}px;
          height:${Math.random() * 8 + 6}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
          animation:confettiFall ${Math.random() * 2 + 2}s ease-in forwards;
          animation-delay:${Math.random() * 0.5}s;
          z-index:9999;
          pointer-events:none;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }
    }
  </script>
  <style>
    @keyframes confettiFall {
      to {
        top: 110vh;
        transform: rotate(${Math.random() * 720}deg) translateX(${Math.random() * 200 - 100}px);
        opacity: 0;
      }
    }
  </style>
</body>
</html>
